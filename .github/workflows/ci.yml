name: CI - All Systems

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  python-pipeline:
    name: Python Trading Pipeline
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install and test Python pipeline
      run: |
        cd python
        pip install -r requirements.txt
        pip install pytest flake8 black
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
        black --check . || true
        python -c "from app import app; print('✅ Python pipeline validated')"

  bot:
    name: Bot System
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install and test Bot
      run: |
        cd bot
        pip install -r requirements.txt
        pip install pytest flake8 black
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
        black --check . || true
        python -c "from webhook import app; print('✅ Bot validated')"

  server:
    name: Node.js Server
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: server/package-lock.json
    
    - name: Install and test Server
      run: |
        cd server
        npm ci
        npm run lint || echo "No lint script"
        npm test || echo "No test script"
        echo "✅ Server validated"

  client:
    name: React Client
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json
    
    - name: Install and build Client
      run: |
        cd client
        npm ci
        npm run lint || echo "No lint script"
        npm run build
        echo "✅ Client validated"

  summary:
    name: Summary
    needs: [python-pipeline, bot, server, client]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Check results
      run: |
        if [ "${{ needs.python-pipeline.result }}" == "success" ] && \
           [ "${{ needs.bot.result }}" == "success" ] && \
           [ "${{ needs.server.result }}" == "success" ] && \
           [ "${{ needs.client.result }}" == "success" ]; then
          echo "✅ All systems passed!"
          echo "  - Python Trading Pipeline: ✅"
          echo "  - Bot: ✅"
          echo "  - Server: ✅"
          echo "  - Client: ✅"
          exit 0
        else
          echo "❌ Some systems failed:"
          echo "  - Python Trading Pipeline: ${{ needs.python-pipeline.result }}"
          echo "  - Bot: ${{ needs.bot.result }}"
          echo "  - Server: ${{ needs.server.result }}"
          echo "  - Client: ${{ needs.client.result }}"
          exit 1
        fi
