name: Bot CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'bot/**'
      - '.github/workflows/bot-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'bot/**'
      - '.github/workflows/bot-ci.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        cd bot
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black

    - name: Lint with flake8
      run: |
        cd bot
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Format check with black
      run: |
        cd bot
        black --check --diff .

    - name: Validate imports
      run: |
        cd bot
        python -c "
        import sys
        errors = []
        modules = ['main', 'webhook', 'execution', 'ai_model', 'telegram_bot', 'config']
        for module in modules:
            try:
                __import__(module)
                print(f'✓ {module}')
            except Exception as e:
                errors.append(f'{module}: {str(e)}')
                print(f'✗ {module}: {str(e)}')
        
        if errors:
            print('\n❌ Import validation failed')
            sys.exit(1)
        else:
            print('\n✅ All modules import successfully')
        "

    - name: Run tests
      run: |
        cd bot
        if [ -f "test_*.py" ] || [ -d "tests" ]; then
          pytest --cov=. --cov-report=xml --cov-report=term || echo "No tests found"
        else
          echo "No test files found, skipping pytest"
        fi

    - name: Security check
      continue-on-error: true
      run: |
        pip install bandit
        cd bot
        bandit -r . || true
